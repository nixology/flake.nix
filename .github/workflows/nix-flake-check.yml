name: Nix flake check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  nix-flake-check:
    name: Nix Flake Check
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # needed for Magic Nix Cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@92ffb5400c3776307a27a1727d7e2ac3dcd9f844 # v3

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@3c034b51a9deec0a09ef1df8b436ac5db50fae94 # main

      - name: Run nix flake check
        run: nix flake check
